<!DOCTYPE html>
<html>
<head>
    <title>Simple To-Do App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<body>

<div class="container">
    <h2>📝 My To-Do List</h2>

    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Enter task" required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li>
                {% if task.done %}
                    <s>{{ task.name }}</s>
                {% else %}
                    {{ task.name }}
                {% endif %}

                <div>
                    {% if not task.done %}
                        <a href="/done/{{ loop.index0 }}" class="done">✔</a>
                    {% endif %}
                    <a href="/delete/{{ loop.index0 }}" class="delete">🗑</a>
                </div>
            </li>
        {% endfor %}
    </ul>
</div>

</body>


</body>
</html>
